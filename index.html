<!DOCTYPE html>
<html>
<head>
    <title>Smart Document Agent</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 300px;
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
        }

        #downloadIcon:active{
transform:scale(0.9);
        }

        #downloadIcon{
transition:0.3s;
}

#downloadIcon:hover{
transform:scale(1.2);
}
    </style>
</head>
<body>

    <h1>Smart Document Agent</h1>
    <hr>

    <div id="documentsPanel">

<h3>📂 Uploaded Documents</h3>

<ul id="documentList"></ul>

    </div>
    <hr>

    <input type="file" id="pdfFile" accept=".pdf" multiple>

    <br>

    <button onclick="extractText()">Extract PDF</button>

    <button onclick="analyzeDocument()">
    Analyze Document
    </button></br>

    <button onclick="detectDocument()">
Detect Document Type
    </button>

    <img
src="https://cdn-icons-png.flaticon.com/512/724/724933.png"
width="40"
id="downloadIcon"
onclick="downloadReport()"
style="cursor:pointer; float: right; margin-top:15px;">
    
    <h3>Output</h3>
    
    <div id="loader" style="display:none;">
⏳ Thinking...
    </div>
    
    <textarea id="output" placeholder="PDF text will appear here..."></textarea>

    <div id="results"></div>

    <script>
        let allDocuments = [];
        let extractedText = "";
        let chatHistory = [];
        async function extractText() {

    try {

        document.getElementById("output").value = "Loading PDF...";

        const fileInput = document.getElementById("pdfFile");

        if (fileInput.files.length === 0) {
            alert("Please upload a PDF.");
            return;
        }

         allDocuments = [];
        document.getElementById("documentList").innerHTML = "";

for(const file of fileInput.files){

    let fullText = "";

    const arrayBuffer =
    await file.arrayBuffer();

    const pdf =
    await pdfjsLib.getDocument({
        data:arrayBuffer
    }).promise;

    for(
      let pageNum = 1;
      pageNum <= pdf.numPages;
      pageNum++
    ){

        const page =
        await pdf.getPage(pageNum);

        const content =
        await page.getTextContent();

        const text =
        content.items
        .map(item => item.str)
        .join(" ");

        fullText +=
        `[Page ${pageNum}]\n${text}\n\n`;
    }

    allDocuments.push({

       name:file.name,

       content:fullText

    });

    const list =
document.getElementById("documentList");

const item =
document.createElement("li");

item.textContent = file.name;

list.appendChild(item);

}
        extractedText =
allDocuments.map(doc =>

`Document:
${doc.name}

${doc.content}`

).join("\n\n");

document.getElementById("output").value =
extractedText;
        
        document.getElementById("loader").style.display = "none";

    } catch (error) {
        
        document.getElementById("loader").style.display = "none";
        document.getElementById("output").value =
            "ERROR:\n" + error.message;

        console.error(error);
    }
}
  async function analyzeDocument() {

    if (!extractedText) {
        alert("Please extract a PDF first.");
        return;
    }
    document.getElementById("loader").style.display = "none";
    document.getElementById("output").value =
        "Analyzing document...";

    try {

        document.getElementById("loader").style.display = "block";
        const response = await fetch(
            "https://api.groq.com/openai/v1/chat/completions",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer 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"
                },
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant",
                    messages: [
                        {
                            role: "system",
                            content: "You are a smart document analyst."
                        },
                        {
                            role: "user",
                            content:
`Analyze this document and provide:

1. Executive Summary
2. Important Dates
3. Action Items

Document:

${extractedText.slice(0,3000)}`
                        }
                    ]
                })
            }
        );

        const data = await response.json();

console.log(data);

if (!data.choices) {
    document.getElementById("output").value =
        "API Error:\n" +
        JSON.stringify(data, null, 2);

    return;
}

const answer =
data.choices[0].message.content;

chatHistory.push({
role:"user",
content:question
});

chatHistory.push({
role: "user",
content: String(question)
});

chatHistory.push({
role: "assistant",
content: String(answer)
});


document.getElementById("loader").style.display = "none";

document.getElementById("output").value =
answer;
        
    } catch(error){

document.getElementById("loader").style.display = "none";

document.getElementById("output").value =
"Error: " + error.message;

    }
  }
        async function askQuestion() {

    const question =
        document.getElementById("question").value;

    if (!question) {
        alert("Type a question first.");
        return;
    }

    if (!extractedText) {
        alert("Extract a PDF first.");
        return;
    }
            
    document.getElementById("loader").style.display = "none";
    document.getElementById("output").value =
        "Thinking...";

    try {

        document.getElementById("loader").style.display = "block";
        const response = await fetch(
            "https://api.groq.com/openai/v1/chat/completions",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization":
                    "Bearer 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"
                },

                body: JSON.stringify({

                    model: "llama-3.1-8b-instant",

                     messages: [

{
role: "system",
content: "Answer questions about uploaded documents. Be concise and include source pages if possible."
},

...chatHistory.filter(
msg => typeof msg.content === "string"
),

{
role: "user",
content: `${question}

Document:

${extractedText.slice(0,3000)}`
}

]
                })
            }
        );

        const data = await response.json();

console.log(data);

if (!data.choices) {
    document.getElementById("output").value =
        "API Error:\n" +
        JSON.stringify(data, null, 2);

    return;
}

const answer =
data.choices[0].message.content;

document.getElementById("loader").style.display = "none";

document.getElementById("output").value =
answer;

    } catch(error){

document.getElementById("loader").style.display = "none";

document.getElementById("output").value =
"Error: " + error.message;

    }
        }
        async function detectDocument() {

    if (!extractedText) {
        alert("Please extract a PDF first.");
        return;
    }
            
    document.getElementById("loader").style.display = "none";
    document.getElementById("output").value =
        "Detecting document type...";

    try {

        document.getElementById("loader").style.display = "block";
        const response = await fetch(
            "https://api.groq.com/openai/v1/chat/completions",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization":
                    "Bearer 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"
                },

                body: JSON.stringify({

                    model: "llama-3.1-8b-instant",

                    messages: [
                        {
                            role: "system",
                            content:
                            "You classify documents."
                        },
                        {
                            role: "user",
                            content:
`Determine the document type.

Choose only one:

Invoice
Contract
Resume
Research Paper
Meeting Notes
Medical Report
Other

Document:

${extractedText.slice(0,3000)}`
                        }
                    ]
                })
            }
        );

         const data = await response.json();

console.log(data);

if (!data.choices) {
    document.getElementById("output").value =
        "API Error:\n" +
        JSON.stringify(data, null, 2);

    return;
}

const answer =
data.choices[0].message.content;
        
document.getElementById("loader").style.display = "none";
        
document.getElementById("output").value =
answer;

    } catch(error){
        
        document.getElementById("loader").style.display = "none";
        document.getElementById("output").value =
            "Error: " + error.message;
    }
        }
        function downloadReport() {

    const report =
    document.getElementById("output").value;

    if (!report) {
        alert("No report available.");
        return;
    }

    const blob = new Blob(
        [report],
        {type:"text/plain"}
    );

    const link =
    document.createElement("a");

    link.href =
    URL.createObjectURL(blob);

    link.download =
    "AI_Report.txt";

    link.click();
        }
    </script>
    <center>
    <input type="text"
id="question"
placeholder="Ask about this document">


  <button onclick="askQuestion()">
Ask
</button>
    </center>
</body>
</html>
