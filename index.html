    <script>
        let allDocuments = [];
        let extractedText = "";
        let chatHistory = [];
             
 async function extractText(){

try{

document.getElementById("loader").style.display="block";

const fileInput =
document.getElementById("pdfFile");

if(fileInput.files.length===0){

alert("Please upload a file");

document.getElementById("loader").style.display="none";

return;

}

allDocuments=[];

document.getElementById(
"documentList"
).innerHTML="";

for(const file of fileInput.files){

let fullText="";

if(file.type.includes("image")){

fullText =
await extractImageText(file);

}else{

const arrayBuffer =
await file.arrayBuffer();

const pdf =
await pdfjsLib.getDocument({
data:arrayBuffer
}).promise;

for(
let pageNum=1;
pageNum<=pdf.numPages;
pageNum++
){

const page =
await pdf.getPage(pageNum);

const content =
await page.getTextContent();

const text =
content.items
.map(item=>item.str)
.join(" ");

fullText += text + "\n\n";

}

}

allDocuments.push({
name:file.name,
content:fullText
});

}

extractedText =
allDocuments
.map(doc=>doc.content)
.join("\n\n");

document.getElementById(
"output"
).innerHTML=
extractedText;

document.getElementById(
"loader"
).style.display="none";

}catch(error){

document.getElementById(
"loader"
).style.display="none";

document.getElementById(
"output"
).innerHTML=
"ERROR:<br>"+error.message;

console.error(error);

}

 }
 
  async function analyzeDocument() {

    if (!extractedText) {
        document.getElementById("loader").style.display="none";
        alert("Please extract a PDF first.");
        return;
    }
    document.getElementById("loader").style.display = "block";

document.getElementById("output").innerHTML =
"Analysing...";

    try {

        document.getElementById("loader").style.display = "block";
        const response = await fetch(
            "https://api.groq.com/openai/v1/chat/completions",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer 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"
                },
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant",
                    messages: [
                        {
                            role: "system",
                            content: "You are a smart document analyst."
                        },
                        {
                            role: "user",
                            content:
`Analyze this document and provide:

1. Executive Summary
2. Important Dates
3. Action Items

Document:

${extractedText.slice(0,3000)}`
                        }
                    ]
                })
            }
        );

        const data = await response.json();

console.log(data);

if (!data.choices) {
    document.getElementById("output").innerHTML =
"API Error:<br>" +
JSON.stringify(data, null, 2);
    return;
}

const answer =
data.choices[0].message.content;

chatHistory.push({
role:"assistant",
content:String(answer)
});


document.getElementById("loader").style.display = "none";

document.getElementById("output").innerHTML = answer
.replace(/\*\*(.*?)\*\*/g,"<b>$1</b>")
.replace(/\*(.*?)\*/g,"<i>$1</i>")
.replace(/\n/g,"<br>");
        
    } catch(error){

document.getElementById("loader").style.display = "none";

document.getElementById("output").innerHTML =
"Error: " + error.message;

    }
  }

        function downloadReport() {

    const report =
    document.getElementById("output").innerText;

    if (!report) {
        alert("No report available.");
        return;
    }

    const blob = new Blob(
        [report],
        {type:"text/plain"}
    );

    const link =
    document.createElement("a");

    link.href =
    URL.createObjectURL(blob);

    link.download =
    "AI_Report.txt";

    link.click();
        }

async function extractImageText(file){
